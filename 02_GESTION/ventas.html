<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5TIERRAS - Módulo de Ventas (GIS Offline/Online)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            overflow-y: auto;
            padding: 20px;
        }

        .ventas-container {
            display: flex;
            height: calc(100vh - 180px);
            gap: 20px;
            margin-top: 20px;
        }

        #mini-map {
            flex: 2;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #1a1a1a;
            position: relative;
        }

        .details-panel {
            flex: 1;
            background: var(--glass);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 800;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .btn-save {
            background: var(--primary);
            color: var(--dark);
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
        }

        .status-tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .status-available {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
        }

        .status-sold {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .status-reserved {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .project-switch {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .project-switch button {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .project-switch button.active {
            background: var(--primary);
            color: var(--dark);
            border-color: var(--primary);
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            display: none;
        }

        @media (max-width: 1024px) {
            .ventas-container {
                flex-direction: column;
                height: auto;
            }

            #mini-map {
                height: 400px;
                flex: none;
            }

            .details-panel {
                flex: none;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>
    <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Volver al Portal</a>
    <h1 class="brand">Control de Lotes 5TIERRAS</h1>

    <div class="project-switch" id="switcher">
        <button onclick="changeProject('El Copihue', this)" class="active">Hacienda El Copihue</button>
        <button onclick="changeProject('Las Brisas', this)">Las Brisas</button>
        <button onclick="changeProject('Hacienda Los Encinos', this)">Hacienda Los Encinos</button>
        <button onclick="changeProject('Los Naranjos', this)">Los Naranjos</button>
    </div>

    <div class="ventas-container">
        <div id="mini-map">
            <div id="loader"><i class="fa-solid fa-spinner fa-spin"></i> Cargando GIS...</div>
        </div>

        <div class="details-panel" id="parcela-info">
            <div id="no-selection">
                <i class="fa-solid fa-mouse-pointer"
                    style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
                <h2>Selecciona un Lote</h2>
                <p>Haz clic en cualquier polígono del mapa para ver los datos del lote y registrar un Lead.</p>
            </div>

            <div id="form-container" style="display:none;">
                <div id="status-badge" class="status-tag"></div>
                <h2 id="lote-title" style="margin-bottom: 5px;">Lote #</h2>
                <div style="display: flex; gap: 20px; margin-bottom: 20px; font-size: 14px; opacity: 0.8;">
                    <span><i class="fa-solid fa-ruler-combined"></i> <span id="lote-area">--</span></span>
                    <span><i class="fa-solid fa-tag"></i> <span id="lote-price">--</span></span>
                </div>
                <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px;">
                <h4 style="color: var(--primary); margin-bottom: 15px; font-size: 12px; text-transform: uppercase;">
                    Registro de Interés</h4>
                <div class="form-group"><label>Nombre</label><input type="text" placeholder="Ej: Roberto"></div>
                <div class="form-group"><label>Email o WhatsApp</label><input type="text" placeholder="+56 9 ..."></div>
                <button class="btn-save" onclick="alert('Lead registrado y vinculado')">Sincronizar Lead</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // CONFIGURACIÓN CENTRALIZADA (Apuntando a los nuevos catálogos estandarizados)
        const PROJECT_DATA = {
            'El Copihue': {
                center: [-36.120, -71.776], zoom: 15,
                layers: [
                    { path: 'hacienda_copihue/layers/Disponibles_2.js', var: 'json_Disponibles_2', status: 'Disponible' },
                    { path: 'hacienda_copihue/layers/Vendidas_3.js', var: 'json_Vendidas_3', status: 'Vendida' },
                    { path: 'hacienda_copihue/layers/Reservadas_4.js', var: 'json_Reservadas_4', status: 'Reservada' }
                ]
            },
            'Las Brisas': {
                center: [-36.385, -71.953], zoom: 16,
                layers: [
                    { path: 'las_brisas/layers/Disponibles_5.js', var: 'json_Disponibles_5', status: 'Disponible' },
                    { path: 'las_brisas/layers/Vendidas_4.js', var: 'json_Vendidas_4', status: 'Vendida' },
                    { path: 'las_brisas/layers/Reservadas_6.js', var: 'json_Reservadas_6', status: 'Reservada' }
                ]
            },
            'Hacienda Los Encinos': {
                center: [-36.468, -71.842], zoom: 16,
                layers: [
                    { path: 'hacienda_encinos/layers/Disponibles_4.js', var: 'json_Disponibles_4', status: 'Disponible' },
                    { path: 'hacienda_encinos/layers/Vendidas_3.js', var: 'json_Vendidas_3', status: 'Vendida' },
                    { path: 'hacienda_encinos/layers/Reservadas_5.js', var: 'json_Reservadas_5', status: 'Reservada' }
                ]
            },
            'Los Naranjos': {
                center: [-36.478, -71.838], zoom: 15,
                layers: [
                    { path: 'fundo_naranjos/layers/Disponibles_3.js', var: 'json_Disponibles_3', status: 'Disponible' },
                    { path: 'fundo_naranjos/layers/Vendidas_2.js', var: 'json_Vendidas_2', status: 'Vendida' },
                    { path: 'fundo_naranjos/layers/Reservadas_4.js', var: 'json_Reservadas_4', status: 'Reservada' }
                ]
            }
        };

        var map = L.map('mini-map', { zoomControl: false }).setView([-36.120, -71.776], 15);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
        }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        function updateLabels() {
            if (map.getZoom() >= 16) {
                document.getElementById('mini-map').classList.add('show-labels');
            } else {
                document.getElementById('mini-map').classList.remove('show-labels');
            }
        }

        map.on('zoomend', updateLabels);
        updateLabels();

        var currentLayerGroup = L.layerGroup().addTo(map);
        var selectedLayer = null;

        function loadLayerOffline(path, varName) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = path;
                script.async = true;
                script.onload = () => {
                    const data = window[varName];
                    if (data) resolve(data);
                    else reject(new Error("Variable " + varName + " no encontrada"));
                    document.head.removeChild(script);
                };
                script.onerror = () => reject(new Error("Error cargando archivo: " + path));
                document.head.appendChild(script);
            });
        }

        function getStyle(status) {
            let color = "#2ecc71";
            if (status === 'Vendida') color = "#e74c3c";
            if (status === 'Reservada') color = "#f1c40f";
            return { fillColor: color, weight: 1, opacity: 1, color: 'white', fillOpacity: 0.5 };
        }

        async function changeProject(name, btn) {
            document.querySelectorAll('#switcher button').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.getElementById('loader').style.display = 'block';

            currentLayerGroup.clearLayers();
            selectedLayer = null;
            document.getElementById('no-selection').style.display = 'block';
            document.getElementById('form-container').style.display = 'none';

            const config = PROJECT_DATA[name];

            for (const l of config.layers) {
                try {
                    const geojson = await loadLayerOffline(l.path, l.var);
                    L.geoJSON(geojson, {
                        style: getStyle(l.status),
                        onEachFeature: (feature, layer) => {
                            const lote = feature.properties.Lote || feature.properties.id || feature.properties.name || feature.properties.fid || '';
                            if (lote) {
                                layer.bindTooltip(lote.toString(), {
                                    permanent: true,
                                    direction: 'center',
                                    className: 'lot-label'
                                });
                            }
                            layer.on('click', (e) => {
                                L.DomEvent.stopPropagation(e);
                                if (selectedLayer) selectedLayer.layer.setStyle(getStyle(selectedLayer.status));
                                selectedLayer = { layer, status: l.status };
                                layer.setStyle({ weight: 5, color: '#fff', fillOpacity: 0.9 });
                                layer.bringToFront();
                                showDetails(feature.properties, l.status);
                                map.flyTo(e.latlng, 17);
                            });
                        }
                    }).addTo(currentLayerGroup);
                } catch (err) { console.error(err); }
            }

            map.flyTo(config.center, config.zoom);
            document.getElementById('loader').style.display = 'none';
        }

        function showDetails(props, status) {
            document.getElementById('no-selection').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';

            const findProp = (keys) => {
                for (let k of keys) {
                    const found = Object.keys(props).find(p => p.toLowerCase() === k.toLowerCase());
                    if (found) return props[found];
                }
                return null;
            };

            const lote = findProp(['Lote', 'id', 'name', 'fid', 'number']);
            const area = findProp(['Area', 'Hectareas', 'Sup', 'm2', 'surface']);
            const price = findProp(['Precio', 'Price', 'Valor', 'cost']);

            document.getElementById('lote-title').innerText = "Lote " + (lote || "S/N");
            document.getElementById('lote-area').innerText = area || "5.000 m2";
            document.getElementById('lote-price').innerText = price ? (price.toString().includes('$') ? price : '$ ' + price) : "$ 18.000.000";

            const badge = document.getElementById('status-badge');
            badge.innerText = status;
            badge.className = "status-tag";
            if (status === 'Vendida') badge.classList.add('status-sold');
            else if (status === 'Reservada') badge.classList.add('status-reserved');
            else badge.classList.add('status-available');
        }

        changeProject('El Copihue', document.querySelector('#switcher button'));
    </script>
</body>

</html>
