<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="../../../04_RECURSOS/5T.jfif">
    <title>Los Naranjos — Gestión de Lotes</title>
    <meta name="description"
        content="App de gestión inmobiliaria para Los Naranjos. Control de lotes, estados y precios en tiempo real.">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- App Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">

        <!-- ═══ LOADING SCREEN ═══ -->
        <div class="loading-screen">
            <img src="../../../04_RECURSOS/Logos/Los%20Naranjos.png" class="loading-logo" alt="Logo">
            <div class="loading-bar"><div class="loading-bar-inner"></div></div>
        </div>

        <!-- ═══ TOP BAR ═══ -->
        <header class="app-header">
            <div class="header-content">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <a href="../../index.html" class="back-btn" style="width: 36px; height: 36px; border-radius: 10px;"><i class="fa-solid fa-chevron-left"></i></a>
                    <div style="display: flex; flex-direction: column;">
                        <div style="font-size: 8px; color: var(--text-dim); font-weight: 700; letter-spacing: 0.5px;">GESTIÓN</div>
                        <div style="font-size: 14px; font-weight: 800; color: #fff;">Los Naranjos</div>
                    </div>
                </div>

                <div class="header-right">
                    <div id="sync-indicator" class="sync-indicator"></div>
                    <button id="copy-link-btn" class="copy-link-btn" title="Copiar link de clientes">
                        <i class="fa-solid fa-copy"></i> Link
                    </button>
                    <a href="../../../01_CLIENTES/hacienda_naranjos/app/index.html" target="_blank" class="public-link">
                        <i class="fa-solid fa-external-link"></i> Público
                    </a>
                    <button id="header-populate-btn" class="back-btn" title="Subir datos al Excel" style="width: 38px; height: 38px; border-radius: 12px; font-size: 16px; color: #818cf8; background: var(--surface);">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                    </button>
                </div>
            </div>
        </header>
        <div id="map"></div>

        <!-- ═══ FLOATING ACTION BUTTONS ═══ -->
        <div class="fab-container">
            <button id="fab-locate" class="fab fab--locate" title="Mi ubicación">
                <i class="fa-solid fa-location-crosshairs" style="color:white; font-size: 24px;"></i>
            </button>
        </div>

        <!-- ═══ STATS BAR ═══ -->
        <div class="stats-bar">
            <div class="stat-item stat-item--disponible">
                <span id="stat-disponible" class="stat-item__count">0</span>
                <span class="stat-item__label">Disponibles</span>
            </div>
            <div class="stat-item stat-item--reservada">
                <span id="stat-reservada" class="stat-item__count">0</span>
                <span class="stat-item__label">Reservadas</span>
            </div>
            <div class="stat-item stat-item--vendida">
                <span id="stat-vendida" class="stat-item__count">0</span>
                <span class="stat-item__label">Vendidas</span>
            </div>
        </div>

        <!-- ═══ BOTTOMSHEET OVERLAY ═══ -->
        <div id="bottomsheet-overlay" class="bottomsheet-overlay"></div>

        <!-- ═══ BOTTOMSHEET ═══ -->
        <div id="bottomsheet" class="bottomsheet">
            <div class="bottomsheet__handle"></div>

            <!-- Header -->
            <div class="bottomsheet__header">
                <div>
                    <div id="bs-lote-id" class="bottomsheet__lote-id">Lote --</div>
                    <div id="bs-lote-area" class="bottomsheet__lote-area">--</div>
                </div>
                <button id="bs-close" class="bottomsheet__close">✕</button>
            </div>

            <!-- Current Status -->
            <div id="bs-current-status" class="bottomsheet__current-status bottomsheet__current-status--disponible">
                <span>●</span> Disponible
            </div>

            <!-- Quick-Tap Status Buttons -->
            <div class="status-buttons">
                <button class="status-btn status-btn--disponible" data-estado="Disponible">
                    <span class="status-btn__icon">🟢</span>
                    <span class="status-btn__label">Disponible</span>
                </button>
                <button class="status-btn status-btn--reservada" data-estado="Reservada">
                    <span class="status-btn__icon">🟡</span>
                    <span class="status-btn__label">Reservada</span>
                </button>
                <button class="status-btn status-btn--vendida" data-estado="Vendida">
                    <span class="status-btn__icon">🔴</span>
                    <span class="status-btn__label">Vendida</span>
                </button>
            </div>

            <!-- Price Editor -->
            <div id="price-row" class="price-row">
                <span class="price-row__icon">💰</span>
                <div class="price-row__content">
                    <div class="price-row__label">Precio</div>
                    <div id="bs-price-value" class="price-row__value">$ 0</div>
                </div>
                <span class="price-row__edit-icon">✏️</span>
            </div>

            <!-- ── Comment Section ── -->
            <button id="comment-toggle-btn" class="comment-btn">
                <span class="comment-btn__icon">💬</span>
                <span id="comment-btn-preview" class="comment-btn__preview">Agregar comentario...</span>
                <button id="comment-delete-btn" class="comment-btn__delete" title="Borrar comentario">🗑️</button>
                <i class="fa-solid fa-chevron-down comment-btn__chevron"></i>
            </button>
            <div id="comment-panel" class="comment-panel">
                <textarea id="comment-textarea" class="comment-textarea" placeholder="Escribe un comentario breve sobre este lote..."></textarea>
                <button id="comment-save-btn" class="comment-save-btn"><i class="fa-solid fa-floppy-disk"></i> Guardar comentario</button>
            </div>

            <div id="bs-vendida-info" class="vendida-info" style="display:none;">
                <div class="vendida-info__icon">🔒</div>
                <div class="vendida-info__title">Lote Vendido</div>
                <div class="vendida-info__text">Este lote ya fue vendido y no puede ser editado.</div>
            </div>

            <!-- Last Modified -->
            <div id="bs-last-modified" class="last-modified">
                Última modificación: --
            </div>
        </div>

        <!-- ═══ FULLSCREEN NUMPAD ═══ -->
        <div id="numpad-overlay" class="numpad-overlay">
            <div class="numpad__header">
                <div class="numpad__title">💰 Editar Precio</div>
                <button id="numpad-cancel" class="numpad__cancel">Cancelar</button>
            </div>
            <div class="numpad__display">
                <div class="numpad__display-label">Nuevo Precio</div>
                <div id="numpad-display-value" class="numpad__display-value">
                    <span class="currency">$</span> 0
                </div>
            </div>
            <div class="numpad__grid">
                <button class="numpad__key" data-key="1">1</button>
                <button class="numpad__key" data-key="2">2</button>
                <button class="numpad__key" data-key="3">3</button>
                <button class="numpad__key" data-key="4">4</button>
                <button class="numpad__key" data-key="5">5</button>
                <button class="numpad__key" data-key="6">6</button>
                <button class="numpad__key" data-key="7">7</button>
                <button class="numpad__key" data-key="8">8</button>
                <button class="numpad__key" data-key="9">9</button>
                <button class="numpad__key numpad__key--back" data-key="back">⌫</button>
                <button class="numpad__key" data-key="0">0</button>
                <button class="numpad__key numpad__key--confirm" data-key="confirm">✓</button>
            </div>
        </div>

        <!-- ═══ TOAST CONTAINER ═══ -->
        <div id="toast-container" class="toast-container"></div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Data Sources -->
    <!-- Unified Map Data Source -->
    <script src="../../../03_CORAZON/layers/naranjos_master.js?v=1.2"></script>

    <!-- Shared Sync Module -->
    <script src="../../../03_CORAZON/config.js"></script>
    <script src="../../../03_CORAZON/sync.js"></script>
    <!-- Data Module -->
    <script src="data.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
